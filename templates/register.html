<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像登録</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1 class="page-title">画像登録</h1>
            <p class="page-subtitle">画像、タイトル、説明文を登録します。</p>
        </header>

        <section class="card form-card">
            <form method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label" for="image">画像</label>
                    <input class="form-file" id="image" type="file" name="image" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="title">タイトル</label>
                    <input class="form-input" id="title" type="text" name="title" maxlength="100" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">説明文</label>
                    <textarea class="form-textarea" id="description" name="description" maxlength="2000"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">タグ編集</label>

                    <div class="tag-edit-list">
                        {# 新規追加用の空行 #}
                        {% for _ in range(3) %}
                        <div class="tag-edit-row">
                            <input
                                class="form-input"
                                type="text"
                                name="tag_name[]"
                                value=""
                                maxlength="50"
                                placeholder="新しいタグ名"
                            >

                            <select class="form-input" name="tag_color[]">
                                <option value="" selected>選択してください</option>
                                {% for color_value, color_label in tag_color_options.items() %}
                                <option value="{{ color_value }}">
                                    {{ color_label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endfor %}
                    </div>

                    <p class="form-help-text">
                        空欄の行は無視されます。
                    </p>
                </div>

                <div class="actions">
                    <button type="submit">登録</button>
                    <a class="button button-secondary" href="{{ url_for('main_page') }}">一覧に戻る</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
