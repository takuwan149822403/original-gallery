<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像更新</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1 class="page-title">画像更新</h1>
            <p class="page-subtitle">画像のタイトル、説明文、タグを更新します。</p>
        </header>

        <section class="card form-card">
            <form method="post">
                <div class="form-group">
                    <label class="form-label" for="title">タイトル</label>
                    <input class="form-input" id="title" type="text" name="title" value="{{ picture.title }}" maxlength="100">
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">説明文</label>
                    <textarea class="form-textarea" id="description" name="description" maxlength="2000">{{ picture.description or '' }}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">タグ編集</label>

                    <div class="tag-edit-list">
                        {% for tag in picture.tags %}
                        <div class="tag-edit-row">
                            <input
                                class="form-input"
                                type="text"
                                name="tag_name[]"
                                value="{{ tag.name }}"
                                maxlength="50"
                                placeholder="タグ名"
                            >

                            <select class="form-input" name="tag_color[]">
                                {% for color_value, color_label in tag_color_options.items() %}
                                <option value="{{ color_value }}" {% if tag.color == color_value %}selected{% endif %}>
                                    {{ color_label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endfor %}

                        {# 新規追加用の空行 #}
                        {% for _ in range(3) %}
                        <div class="tag-edit-row">
                            <input
                                class="form-input"
                                type="text"
                                name="tag_name[]"
                                value=""
                                maxlength="50"
                                placeholder="新しいタグ名"
                            >

                            <select class="form-input" name="tag_color[]">
                                <option value="" selected>選択してください</option>
                                {% for color_value, color_label in tag_color_options.items() %}
                                <option value="{{ color_value }}">
                                    {{ color_label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endfor %}
                    </div>

                    <p class="form-help-text">
                        空欄の行は無視されます。既存タグの名前・色をそのまま編集できます。
                    </p>
                </div>

                <div class="actions">
                    <button type="submit">更新</button>
                    <a class="button button-secondary" href="{{ url_for('picture_detail', picture_id=picture.id) }}">詳細画面に戻る</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
