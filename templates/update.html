<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像更新</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1 class="page-title">画像更新</h1>
            <p class="page-subtitle">画像のタイトル、説明文、タグを更新します。</p>
        </header>

        <section class="card form-card">
            <form method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label" for="title">タイトル</label>
                    <input class="form-input" id="title" type="text" name="title" value="{{ picture.title }}" maxlength="100">
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">説明文</label>
                    <textarea class="form-textarea" id="description" name="description" maxlength="2000">{{ picture.description or '' }}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tags">タグ（カンマ区切り）</label>
                    <input class="form-input" id="tags" type="text" name="tags" value="{% for tag in picture.tags %}{{ tag.name }}{% if not loop.last %}, {% endif %}{% endfor %}" placeholder="例：風景,春,自然">
                </div>

                <div class="actions">
                    <button type="submit">更新</button>
                    <a class="button button-secondary" href="{{ url_for('picture_detail', picture_id=picture.id) }}">詳細画面に戻る</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
