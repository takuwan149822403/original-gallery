name: 機能要望
description: 新機能、改善案、UI/UX改善、運用改善を提案する
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        改善したい内容をできるだけ具体的に記入してください。
        UI、検索、タグ、登録/更新導線、エラー表示、保守性改善など歓迎です。

  - type: textarea
    id: summary
    attributes:
      label: 要望の概要
      description: 追加・改善したい内容を一文で書いてください。
      placeholder: 一覧画面でタイトル・説明文・タグを条件別に検索できるようにしたい
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - UI/UX
        - 検索
        - タグ
        - 画像登録
        - 画像更新
        - 画像削除
        - エラーハンドリング
        - データベース
        - パフォーマンス
        - 保守性 / リファクタリング
        - ドキュメント
        - その他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 解決したい課題
      description: 何が不便で、なぜ必要かを書いてください。
      placeholder: 現在は検索条件が1つのキーワードにまとまっているため、タグ完全一致だけで探したい場合に使いづらい
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: できるだけ具体的に書いてください。
      placeholder: |
        - 一覧画面に検索バーを追加
        - タイトルは部分一致
        - タグは完全一致
        - 説明文は部分一致
        - 検索条件を個別入力できるようにする
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: このIssueが完了したと言える条件を書いてください。
      placeholder: |
        - 一覧画面から条件別検索ができる
        - 条件未入力時は全件表示
        - 検索結果0件時にメッセージ表示
        - 既存機能に影響しない
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 / 補足
      description: 別案や妥協案があれば記入してください。
      placeholder: タグ検索だけ先に対応し、タイトル・説明文は後続対応でもよい
    validations:
      required: false

  - type: input
    id: related_files
    attributes:
      label: 関連しそうなファイル
      description: 分かる範囲で記入してください。
      placeholder: app.py, templates/main_page.html, templates/update.html, static/style.css
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue と重複していないことを確認した
          required: true
        - label: 解決したい課題と提案内容を書いた
          required: true